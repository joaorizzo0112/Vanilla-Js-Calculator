<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calculator</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2315171a'/><text x='50%' y='50%' font-family='monospace' font-size='65' fill='%23FDE047' dominant-baseline='central' text-anchor='middle'>π</text></svg>">
  
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="wrap">
    <div class="calculator">
      
      <div class="display-container">
        <div class="top-bar">
          <div class="mode-toggle">
            <span class="label">standard</span>
            <label class="switch">
              <input type="checkbox" id="scientific-switch">
              <span class="slider"></span>
            </label>
            <span class="label">scientific</span>
          </div>
          <div id="history"></div>
        </div>
        <div id="result">0</div>
      </div>

      <div class="pad">
        <button class="btn sci" data-value="sin(">sin</button>
        <button class="btn sci" data-value="cos(">cos</button>
        <button class="btn func" data-action="clear">C</button>
        <button class="btn func" data-value="(">(</button>
        <button class="btn func" data-value=")">)</button>
        <button class="btn op" data-value="÷">÷</button>

        <button class="btn sci" data-value="tan(">tan</button>
        <button class="btn sci" data-value="log(">log</button>
        <button class="btn num" data-value="7">7</button>
        <button class="btn num" data-value="8">8</button>
        <button class="btn num" data-value="9">9</button>
        <button class="btn op" data-value="×">×</button>

        <button class="btn sci" data-value="ln(">ln</button>
        <button class="btn sci" data-value="π">π</button>
        <button class="btn num" data-value="4">4</button>
        <button class="btn num" data-value="5">5</button>
        <button class="btn num" data-value="6">6</button>
        <button class="btn op" data-value="−">−</button>

        <button class="btn sci" data-value="e">e</button>
        <button class="btn sci" data-value="^">^</button>
        <button class="btn num" data-value="1">1</button>
        <button class="btn num" data-value="2">2</button>
        <button class="btn num" data-value="3">3</button>
        <button class="btn op" data-value="+">+</button>

        <button class="btn sci" data-value="√(">√</button>
        <button class="btn sci" data-value="%">%</button>
        <button class="btn num" data-value="0">0</button>
        <button class="btn num" data-value=".">.</button>
        <button class="btn func" data-action="backspace">DEL</button>
        <button class="btn equal" data-action="equals">=</button>
      </div>
    </div>
  </main>

  <footer class="creator-tag">
    Designed & Coded by <a href="https://github.com/joaorizzo0112" target="_blank" rel="noopener noreferrer">@joaorizzo0112</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
